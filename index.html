<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Malla Curricular</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f2f4f8;
    font-family: "Segoe UI", Arial, sans-serif;
}

/* HERO */

.hero{
    height:220px;
    background-image:url("faces.png");
    background-size:cover;
    background-position:center;
    position:relative;
}

.hero-overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.25);
}

/* SELECTOR */

.selector-carrera{
    background:white;
    padding:15px;
    border-radius:6px;
    margin-top:-40px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* TARJETA INFORMACIÓN */

.carrera-card{
    background:linear-gradient(135deg,#0b3c6d,#1f5ea8);
    color:white;
    padding:30px;
    border-radius:6px;
    margin-top:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.carrera-card h1{
    font-size:32px;
    font-weight:700;
}

.carrera-card h5{
    opacity:.9;
}

.perfil{
    margin-top:15px;
    font-size:14px;
    line-height:1.5;
}

/* SIDEBAR */

.sidebar{
    background:white;
    border-radius:6px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.sidebar a{
    display:block;
    text-decoration:none;
    color:#333;
}

.sidebar a:hover{
    color:#0b3c6d;
    text-decoration:underline;
}

.sidebar .info-item{
    display:block;
    padding:10px 0;
    color:#333;
    font-weight:500;
    border-bottom:1px solid #eee;
}

.sidebar .info-item:last-child{
    border-bottom:none;
}

.sidebar .info-valor{
    color:#0b3c6d;
    font-weight:700;
    margin-left:5px;
}

.sidebar .info-texto-secundario {
    font-weight: normal;
    color: #555;
    display: block;
    margin-top: 4px;
    margin-left: 0;
}

/* MALLA */

.malla{
    margin-top:40px;
}

.semestre-card{
    background:white;
    border-radius:8px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    margin-bottom:25px;
}

.semestre-header{
    background:#8b1e2d;
    color:white;
    font-weight:700;
    padding:10px;
    border-radius:8px 8px 0 0;
    text-align:center;
}

.asignatura{
    padding:6px 12px;
    font-size:14px;
    border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="hero">
<div class="hero-overlay"></div>
</div>

<div class="container">

<div class="selector-carrera">

<label class="form-label"><strong>Seleccionar Universidad y Carrera</strong></label>

<select id="universidadSelect" class="form-select"></select>

</div>

<div class="row mt-4">

<div class="col-lg-8">

<div class="carrera-card" id="infoCarrera"></div>

</div>

<div class="col-lg-4">

<div class="sidebar">

<h5>Información</h5>

<div id="sidebarInfoContent"></div>

</div>

</div>

</div>

<div id="mallaContainer" class="row malla"></div>

</div>

<script src="mallas_universidades_icinf_modificado.js"></script>

<script>

const select = document.getElementById("universidadSelect");

// Verificar que mallas existe y tiene datos
if (typeof mallas !== 'undefined' && mallas.length > 0) {
    mallas.forEach((item, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = item.universidad + " - " + item.carrera;
        select.appendChild(option);
    });

    mostrarMalla(0);

    select.addEventListener("change", function() {
        mostrarMalla(this.value);
    });
} else {
    console.error('No se encontraron datos de mallas');
    document.getElementById("infoCarrera").innerHTML = '<div class="alert alert-danger">Error: No se pudieron cargar los datos</div>';
}

function mostrarMalla(index) {
    const item = mallas[index];
    const info = document.getElementById("infoCarrera");
    const container = document.getElementById("mallaContainer");
    const sidebarInfoContent = document.getElementById("sidebarInfoContent");

    // Actualizar información principal de la tarjeta azul
    info.innerHTML = `
        <h5>${item.universidad}</h5>
        <h1>${item.carrera}</h1>
        <h4>DURACIÓN SEMESTRAL<br>${item.duracion_semestres} SEMESTRES</h4>
        <div class="perfil">
            <strong>PERFIL DE EGRESO</strong><br>
            ${item.perfil_de_egreso}
        </div>
    `;

    // Preparar el HTML del Plan de Estudios
    let planEstudioHTML = "";
    if (item.web) {
        planEstudioHTML = `<a href="${item.web}" target="_blank" rel="noopener noreferrer" class="info-item">Plan de Estudios</a>`;
    } else {
        planEstudioHTML = `<span class="info-item text-muted">Plan de Estudios no disponible</span>`;
    }

    // Inyectar toda la información en el panel lateral respetando el orden y los estilos
    sidebarInfoContent.innerHTML = `
        ${planEstudioHTML}
        
        <span class="info-item">
            Años de Acreditación Institucional <span class="info-valor">${item.anios_acreditacion ? item.anios_acreditacion + ' años' : 'No disponible'}</span>
            <br>
            <small style="font-size: 0.75em; font-weight: normal; color: #666;">fechas de acreditación: ${item.fechas_acreditacion || 'XX'}</small>
        </span>
        
        <span class="info-item">
            Acreditaciones Internacionales 
            <span class="info-valor info-texto-secundario">${item.acreditaciones_internacionales || 'No hay Evidencias'}</span>
        </span>
        
        <span class="info-item">
            Arancel 2024 <span class="info-valor">${item.arancel || 'No disponible'}</span>
        </span>
        
        <span class="info-item">
            Arancel 2026 <span class="info-valor">${item.arancel_2026 || '$------'}</span>
        </span>
        
        <span class="info-item">
            Observaciones 
            <span class="info-valor info-texto-secundario">${item.observaciones || '-----------'}</span>
        </span>
    `;

    // Limpiar y reconstruir malla curricular
    container.innerHTML = "";

    item.malla_curricular.forEach(sem => {
        let asignaturasHTML = "";
        
        sem.asignaturas.forEach(asig => {
            asignaturasHTML += `<div class="asignatura">${asig.nombre}</div>`;
        });
        
        const col = document.createElement("div");
        col.className = "col-xl-2 col-lg-3 col-md-4 col-sm-6";
        col.innerHTML = `
            <div class="semestre-card">
                <div class="semestre-header">
                    SEMESTRE ${sem.semestre}
                </div>
                ${asignaturasHTML}
            </div>
        `;
        container.appendChild(col);
    });
}

</script>

</body>
</html>
